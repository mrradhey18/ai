<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Share Your Experience</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts — Sora (headings) + Nunito (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── BASE ───────────────────────────────────── */
 :root {
  --green-deep:    #0f172a;
  --green-mid:     #6366f1;
  --green-light:   #1e293b;
  --green-pale:    #0f172a;
  --gold:          #f59e0b;
  --gold-light:    #1e293b;
  --text-dark:     #f1f5f9;
  --text-mid:      #cbd5e1;
  --text-soft:     #94a3b8;
  --white:         #1e293b;
  --shadow-soft:   0 4px 24px rgba(99,102,241,0.18);
  --shadow-card:   0 2px 16px rgba(0,0,0,0.35);
  --radius-lg:     16px;
  --radius-xl:     22px;
}

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f172a;
      color: var(--text-dark);
      min-height: 100dvh;
      margin: 0;
      padding: 0;
    }

    h1, h2, h3 { font-family: 'Sora', sans-serif; }

    /* ── LAYOUT ─────────────────────────────────── */
    .app-shell {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--white);
      box-shadow: 0 0 40px rgba(26,107,74,0.08);
    }

    /* ── CLINIC HEADER ──────────────────────────── */
    .clinic-header {
      background: linear-gradient(135deg, #0f172a 0%, #312e81 50%, #4f46e5 100%);
      padding: 28px 24px 22px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .clinic-header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
    }

    .clinic-header::after {
      content: '';
      position: absolute;
      bottom: -60px; left: -30px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
    }

.header-row {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
}

.header-text { text-align: left; }

.header-leaf {
  font-size: 28px;
  display: block;
  margin-bottom: 0;
  flex-shrink: 0;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.35);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(255,255,255,0.08);
}

.clinic-name {
  font-size: 22px; /* was 18px */
}

/* particles */
.header-particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}

.header-particles span {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  animation: floatUp 4s infinite ease-in-out;
}

.header-particles span:nth-child(1) { left: 10%; animation-delay: 0s;    animation-duration: 3.5s; }
.header-particles span:nth-child(2) { left: 30%; animation-delay: 0.8s;  animation-duration: 4.2s; }
.header-particles span:nth-child(3) { left: 55%; animation-delay: 1.4s;  animation-duration: 3.8s; }
.header-particles span:nth-child(4) { left: 72%; animation-delay: 0.3s;  animation-duration: 4.6s; }
.header-particles span:nth-child(5) { left: 88%; animation-delay: 1.9s;  animation-duration: 3.2s; }

@keyframes floatUp {
  0%   { bottom: -10px; opacity: 0; transform: scale(0.8); }
  30%  { opacity: 0.6; }
  100% { bottom: 110%; opacity: 0; transform: scale(1.3); }
}

    .clinic-name {
      font-family: 'Sora', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin: 0 0 4px;
      line-height: 1.2;
    }

    .clinic-tagline {
      font-size: 13px;
      color: rgba(255,255,255,0.80);
      margin: 0;
    }

    .clinic-location {
      font-size: 12px;
      color: rgba(255,255,255,0.60);
      margin-top: 4px;
      display: block;
    }

    /* ── SCREEN SYSTEM ──────────────────────────── */
    .screen {
      flex: 1;
      padding: 24px 20px 32px;
      animation: fadeSlideIn 0.3s ease;
    }

    .screen.hidden { display: none; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── SECTION TITLES ─────────────────────────── */
    .section-title {
      font-family: 'Sora', sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--text-dark);
      margin: 0 0 6px;
      line-height: 1.3;
    }

    .section-sub {
      font-size: 14px;
      color: var(--text-soft);
      margin: 0 0 22px;
    }

    /* ── BACK BUTTON ────────────────────────────── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 600;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-bottom: 18px;
    }

    .back-btn svg {
      width: 16px; height: 16px;
      stroke: var(--text-soft);
    }

    /* ══════════════════════════════════════════════
       SCREEN 1 — SERVICE SELECTION
    ══════════════════════════════════════════════ */
/* ── SERVICE BUTTONS — compact pill style ── */
#service-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.service-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 10px;
  background: #1e293b;
border: 2px solid #334155;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.18s ease;
  font-family: 'Nunito', sans-serif;
  min-height: 52px;
}

.service-btn:active { transform: scale(0.96); }

.service-btn.selected,
.service-btn:hover {
  background: #312e81;
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
}

.service-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dark);
  text-align: center;
  line-height: 1.3;
}

/* ── CUSTOM SERVICE ROW ── */
.custom-service-row {
  grid-column: 1 / -1;
  display: flex;
  gap: 8px;
  margin-top: 4px;
}

.custom-service-input {
  flex: 1;
  padding: 12px 14px;
  border: 2px solid #334155;
  border-radius: 12px;
  font-size: 13px;
  font-family: 'Nunito', sans-serif;
  color: #f1f5f9;
  background: #1e293b;
  outline: none;
  transition: border-color 0.15s;
}

.custom-service-input:focus {
  border-color: #6366f1;
  background: #1e293b;
}

.custom-service-input::placeholder { color: var(--text-soft); }

.custom-service-btn {
  width: 46px;
  height: 46px;
  background: var(--green-deep);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}

.custom-service-btn:active { background: var(--green-mid); }

    /* ══════════════════════════════════════════════
       SCREEN 2 — STAR RATING
    ══════════════════════════════════════════════ */

.emoji-row {
  display: flex;
  justify-content: center;
  gap: 18px;
  padding: 16px 0 4px;
}

.emoji-opt {
  font-size: 48px;
  opacity: 0.25;
  filter: grayscale(1);
  transform: scale(0.85);
  transition: opacity 0.2s, transform 0.2s, filter 0.2s;
  cursor: pointer;
}

.emoji-opt.active {
  opacity: 1;
  filter: grayscale(0);
  transform: scale(1.4);
}

    .star-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 28px 0 16px;
    }

    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      transition: transform 0.15s ease;
    }

    .star-btn svg {
      width: 32px;
      height: 32px;
      fill: #dde8e2;
      stroke: #dde8e2;
      transition: fill 0.12s ease, stroke 0.12s ease, transform 0.12s ease;
    }

    .star-btn.hovered svg,
    .star-btn.selected svg {
      fill: var(--gold);
      stroke: var(--gold);
      transform: scale(1.12);
    }

    .star-label {
      text-align: center;
      font-size: 14px;
      color: var(--text-soft);
      margin-top: 4px;
      min-height: 22px;
      transition: color 0.15s;
    }

    .star-hint {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-soft);
      padding: 0 8px;
      margin-top: 2px;
    }

.emoji-opt.active[data-value="1"] { animation: shake 1.5s infinite; transform-origin: center; }
.emoji-opt.active[data-value="2"] { animation: wobble 2s infinite; transform-origin: center; }
.emoji-opt.active[data-value="3"] { animation: bob 2s infinite; transform-origin: center; }
.emoji-opt.active[data-value="4"] { animation: bounce-em 1.2s infinite; transform-origin: center; }
.emoji-opt.active[data-value="5"] { animation: spin-pop 1.8s infinite; transform-origin: center; }

@keyframes shake {
  0%,100% { transform: scale(1.4) rotate(0deg); }
  25%      { transform: scale(1.4) rotate(-15deg); }
  75%      { transform: scale(1.4) rotate(15deg); }
}

@keyframes wobble {
  0%,100% { transform: scale(1.4) translateX(0); }
  30%      { transform: scale(1.4) translateX(-8px) rotate(-8deg); }
  70%      { transform: scale(1.4) translateX(8px) rotate(8deg); }
}

@keyframes bob {
  0%,100% { transform: scale(1.4) translateY(0); }
  50%      { transform: scale(1.4) translateY(-8px); }
}

@keyframes bounce-em {
  0%,100% { transform: scale(1.4) translateY(0); }
  40%      { transform: scale(1.55) translateY(-12px); }
}

@keyframes spin-pop {
  0%,100% { transform: scale(1.4) rotate(0deg); }
  25%      { transform: scale(1.55) rotate(-12deg); }
  75%      { transform: scale(1.55) rotate(12deg); }
}

.emoji-opt { animation: none !important; }
.emoji-opt.active { animation: unset !important; }

    /* ══════════════════════════════════════════════
       SCREEN 3 — REVIEW OPTIONS
    ══════════════════════════════════════════════ */
    #review-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    /* ── Review Card ──── */
    .review-card {
      background: var(--white);
      border: 1.5px solid #e0ede6;
      border-radius: var(--radius-xl);
      padding: 18px 18px 14px;
      box-shadow: var(--shadow-card);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease, border-color 0.2s, box-shadow 0.2s;
    }

    .review-card.card-visible {
      opacity: 1;
      transform: translateY(0);
    }

    .review-card.copied {
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(45,155,111,0.12);
    }

    .review-card.refreshing {
      opacity: 0.5;
    }

    .review-card.card-refreshed {
      animation: cardPulse 0.5s ease;
    }

    @keyframes cardPulse {
      0%   { box-shadow: 0 0 0 0 rgba(45,155,111,0.3); }
      50%  { box-shadow: 0 0 0 8px rgba(45,155,111,0.1); }
      100% { box-shadow: var(--shadow-card); }
    }

    .review-number {
      font-size: 11px;
      font-weight: 700;
      color: var(--green-mid);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .review-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: var(--text-mid);
      margin: 0 0 14px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .review-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--green-deep);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex: 1;
      justify-content: center;
    }

    .copy-btn svg {
      width: 15px; height: 15px;
    }

    .copy-btn:active { transform: scale(0.97); background: var(--green-mid); }

    .refresh-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      background: var(--green-light);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      flex-shrink: 0;
    }

    .refresh-btn:active { transform: rotate(180deg) scale(0.9); }

    .refresh-btn svg {
      width: 16px; height: 16px;
      stroke: var(--green-deep);
    }

    .copy-confirm {
      font-size: 12px;
      font-weight: 700;
      color: var(--green-mid);
      margin-top: 6px;
    }

    /* ── Google CTA Button ── */
    .cta-section {
      position: sticky;
      bottom: 0;
      background: linear-gradient(to top, var(--white) 80%, transparent);
      padding: 16px 0 8px;
    }

    #google-cta-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-size: 16px;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(66,133,244,0.30);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #google-cta-btn:active {
      transform: scale(0.98);
      box-shadow: 0 2px 10px rgba(66,133,244,0.20);
    }

    .google-icon {
      width: 22px; height: 22px;
      flex-shrink: 0;
    }

    .cta-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-soft);
      margin-top: 10px;
    }

    /* ── Loading ──── */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 0;
      gap: 16px;
    }

    .loading-dots {
      display: flex;
      gap: 8px;
    }

    .loading-dots span {
      width: 10px; height: 10px;
      background: var(--green-mid);
      border-radius: 50%;
      animation: dotBounce 1.2s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.5; }
      40%            { transform: scale(1.1); opacity: 1; }
    }

    .loading-text {
      font-size: 14px;
      color: var(--text-soft);
      margin: 0;
    }

    /* ── Error ──── */
    .error-state {
      text-align: center;
      padding: 48px 0;
    }

    .error-icon { font-size: 36px; margin-bottom: 12px; }

    .error-text {
      font-size: 15px;
      color: var(--text-mid);
      margin-bottom: 18px;
    }

    .retry-btn {
      padding: 10px 24px;
      background: var(--green-deep);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
    }

    /* ── Not Found ──── */
    .not-found-screen {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--green-pale);
      padding: 24px;
    }

    .not-found-content {
      text-align: center;
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 40px 32px;
      max-width: 360px;
      box-shadow: var(--shadow-soft);
    }

    .not-found-icon { font-size: 48px; margin-bottom: 16px; }
    .not-found-content h1 {
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      color: var(--text-dark);
      margin: 0 0 10px;
    }
    .not-found-content p { font-size: 14px; color: var(--text-mid); margin: 0; }
    .not-found-sub { color: var(--text-soft) !important; margin-top: 8px !important; font-size: 13px !important; }

    /* ── Star rating label map ── */
    .star-labels {
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-dark);
      min-height: 24px;
      margin-top: 10px;
    }

    /* ── Progress dots ──────────────────────────── */
    .progress-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 14px 0 0;
    }

    .progress-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #d0e4d8;
      transition: background 0.2s, transform 0.2s;
    }

    .progress-dot.active {
      background: var(--green-mid);
      transform: scale(1.2);
    }

    /* ── Scroll hint on review screen ── */
    .scroll-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-soft);
      padding: 6px 0 0;
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <!-- ── CLINIC HEADER (shared across all screens) ── -->
  <header class="clinic-header">
  <div class="header-row">
    <span class="header-leaf">🌿</span>
    <div class="header-text">
      <h1 class="clinic-name">Loading...</h1>
      <p class="clinic-tagline">Thank you for visiting us</p>
      <span class="clinic-location"></span>
    </div>
  </div>
  <div class="header-particles">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</header>

    <!-- ── PROGRESS INDICATOR ── -->
    <div class="progress-dots" id="progress-dots">
      <div class="progress-dot active" data-screen="1"></div>
      <div class="progress-dot" data-screen="2"></div>
      <div class="progress-dot" data-screen="3"></div>
    </div>

    <!-- ══════════════════════════════════════════
         SCREEN 1 — SERVICE SELECTION
    ══════════════════════════════════════════ -->
    <section class="screen" id="screen-service">
      <h2 class="section-title">What did you visit us for?</h2>
      <p class="section-sub">Select the service you received today</p>

      <!-- Service buttons injected here by ui.js -->
      <div id="service-grid"></div>
    </section>

    <!-- ══════════════════════════════════════════
         SCREEN 2 — STAR RATING
    ══════════════════════════════════════════ -->
    <section class="screen hidden" id="screen-stars">

      <button class="back-btn" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Back
      </button>

      <h2 class="section-title">How was your experience?</h2>
      <p class="section-sub">
        For <strong id="star-service-label">your visit</strong>
      </p>

      <!-- Emoji row -->
<div class="emoji-row">
  <span class="emoji-opt" data-value="1">😞</span>
  <span class="emoji-opt" data-value="2">😐</span>
  <span class="emoji-opt" data-value="3">🙂</span>
  <span class="emoji-opt" data-value="4">😊</span>
  <span class="emoji-opt" data-value="5">🤩</span>
</div>
      <!-- Stars -->
      <div class="star-container" role="group" aria-label="Rate your experience">
        <button class="star-btn" data-value="1" aria-label="1 star">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="star-btn" data-value="2" aria-label="2 stars">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="star-btn" data-value="3" aria-label="3 stars">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="star-btn" data-value="4" aria-label="4 stars">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <button class="star-btn" data-value="5" aria-label="5 stars">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>

      <!-- Dynamic label showing what the stars mean -->
      <div class="star-labels" id="star-label-text"></div>

      <div class="star-hint">
        <span>Poor</span>
        <span>Excellent</span>
      </div>
    </section>

    <!-- ══════════════════════════════════════════
         SCREEN 3 — REVIEW OPTIONS
    ══════════════════════════════════════════ -->
    <section class="screen hidden" id="screen-reviews">

      <button class="back-btn" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Change rating
      </button>

      <h2 class="section-title">Pick a review to share</h2>
      <p class="section-sub">Copy one, then post it on Google</p>

      <p class="scroll-hint">↕ Scroll to see all options</p>

      <!-- Review cards injected here by ui.js -->
      <div id="review-list"></div>

    </section>

  </div><!-- /.app-shell -->

  <!-- ── STAR LABEL SCRIPT (inline, no extra file) ── -->
  <script>
    const starLabels = {
      1: '😞 Not satisfied',
      2: '😐 Could be better',
      3: '🙂 It was okay',
      4: '😊 Pretty good!',
      5: '🤩 Excellent experience!'
    };

    // Update label on hover/click
    document.addEventListener('DOMContentLoaded', () => {
      const labelEl = document.getElementById('star-label-text');
function syncEmojis(value) {
  document.querySelectorAll('.emoji-opt').forEach(e => {
    e.classList.toggle('active', parseInt(e.dataset.value) === parseInt(value));
  });
}

document.querySelectorAll('.star-btn').forEach(btn => {
  btn.addEventListener('mouseenter', () => {
    if (labelEl) labelEl.textContent = starLabels[btn.dataset.value] || '';
    syncEmojis(btn.dataset.value);
  });
  btn.addEventListener('mouseleave', () => {
    const selected = document.querySelector('.star-btn.selected');
    if (labelEl) labelEl.textContent = selected ? starLabels[selected.dataset.value] : '';
    syncEmojis(selected ? selected.dataset.value : 0);
  });
  btn.addEventListener('click', () => {
    if (labelEl) labelEl.textContent = starLabels[btn.dataset.value] || '';
    syncEmojis(btn.dataset.value);
  });
});

// Emoji clicks also trigger star selection
document.querySelectorAll('.emoji-opt').forEach(e => {
  e.addEventListener('click', () => {
    const val = e.dataset.value;
    document.querySelectorAll('.star-btn').forEach(s => {
      s.classList.toggle('hovered', parseInt(s.dataset.value) <= parseInt(val));
      s.classList.toggle('selected', parseInt(s.dataset.value) <= parseInt(val));
    });
    if (labelEl) labelEl.textContent = starLabels[val] || '';
    syncEmojis(val);
    // trigger the actual star click to move forward
  setTimeout(() => {
  if (parseInt(val) <= 2) {
  UI._showSorryToast();
  } else {
    document.querySelector(`.star-btn[data-value="${val}"]`).click();
  }
}, 250);
  });
});

      // Progress dot updater
      const screenObserver = new MutationObserver(() => {
        const active = document.querySelector('.screen:not(.hidden)');
        if (!active) return;
        const map = {
          'screen-service': 1,
          'screen-stars':   2,
          'screen-reviews': 3,
        };
        const step = map[active.id] || 1;
        document.querySelectorAll('.progress-dot').forEach(dot => {
          const n = parseInt(dot.dataset.screen);
          dot.classList.toggle('active', n === step);
        });
      });

      document.querySelectorAll('.screen').forEach(s => {
        screenObserver.observe(s, { attributes: true, attributeFilter: ['class'] });
      });
    });
  </script>
